name: Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      working-directory: Projects/A02/Backend_JAVA_A02_v1
      run: mvn clean package -DskipTests

    - name: Run Trivy FS Scan (SAST)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: 'Projects/A02/Backend_JAVA_A02_v1'
        format: 'table'
        exit-code: '0'
